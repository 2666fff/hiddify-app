<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="回家看看门户网站">
  <meta name="theme-color" content="#112B45">
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="manifest" href="manifest.json">
  <title>回家看看</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #112b45;
      --muted: #4f6472;
      --line: rgba(17, 43, 69, .14);
      --paper: #fff9ec;
      --wash: #e9f3f4;
      --gold: #ffd26a;
      --wood: #a6582a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 210, 106, .36), transparent 34%),
        radial-gradient(circle at 84% 84%, rgba(96, 169, 161, .24), transparent 34%),
        linear-gradient(135deg, var(--paper), var(--wash));
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 20px;
    }

    .portal {
      width: min(960px, 100%);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 56px;
      align-items: center;
    }

    .brand {
      display: inline-flex;
      gap: 12px;
      align-items: center;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, .48);
    }

    .brand img {
      width: 28px;
      height: 28px;
    }

    h1 {
      margin: 28px 0 16px;
      font-size: clamp(44px, 7vw, 86px);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      max-width: 560px;
      margin: 0;
      color: var(--muted);
      font-size: 20px;
      line-height: 1.8;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 34px;
    }

    a {
      display: inline-flex;
      min-height: 48px;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      border-radius: 8px;
      color: var(--ink);
      text-decoration: none;
      font-weight: 700;
    }

    .primary {
      background: var(--ink);
      color: white;
    }

    .secondary {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .58);
    }

    .door {
      width: min(34vw, 260px);
      min-width: 180px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, .8);
      border-radius: 32px;
      background: rgba(255, 255, 255, .38);
    }

    .frame {
      position: relative;
      width: 48%;
      height: 62%;
      border: 18px solid var(--ink);
      border-bottom-width: 12px;
      border-radius: 16px 16px 6px 6px;
      background: var(--gold);
    }

    .leaf {
      position: absolute;
      inset: 8% 12% 6% 20%;
      background: var(--wood);
      transform: perspective(220px) rotateY(-24deg);
      transform-origin: right center;
      box-shadow: inset -10px 0 rgba(0, 0, 0, .22), inset 10px 0 rgba(255, 255, 255, .16);
    }

    .leaf::after {
      content: "";
      position: absolute;
      width: 12px;
      height: 12px;
      right: 18%;
      top: 48%;
      border-radius: 50%;
      background: var(--gold);
    }

    .sill {
      position: absolute;
      left: -24px;
      right: -24px;
      bottom: -18px;
      height: 16px;
      border-radius: 999px;
      background: #355c65;
    }

    @media (max-width: 720px) {
      .portal {
        grid-template-columns: 1fr;
        gap: 32px;
      }

      .door {
        width: 210px;
        order: -1;
      }

      p {
        font-size: 17px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="portal" aria-label="回家看看门户">
      <div>
        <div class="brand">
          <img src="icon.png" alt="">
          <strong>回家看看</strong>
        </div>
        <h1>回家看看</h1>
        <p>选择最快的回家线路，一键开始连接。少一点复杂配置，多一点顺手安心。</p>
        <div class="actions">
          <a class="primary" href="https://huijia.xyz">进入门户网站</a>
          <a class="secondary" href="https://huijia.xyz">下载客户端</a>
        </div>
      </div>
      <div class="door" aria-hidden="true">
        <div class="frame">
          <div class="leaf"></div>
          <div class="sill"></div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
